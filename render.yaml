services:
  - type: web
    name: construct-scenery-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build && npm prune --omit=dev
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: construct-scenery-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        value: admin@constructscenery.co.uk
      - key: ADMIN_NAME
        value: Admin
      # Set these manually in the Render dashboard — do not put secrets in this file
      - key: JWT_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: construct-scenery-db
    databaseName: construct_scenery
    user: cs_admin
    plan: free
